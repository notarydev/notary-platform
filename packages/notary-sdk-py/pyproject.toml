[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "notary-sdk"
version = "0.0.1"
description = "Notary Python SDK — capture and seal AI decision snapshots"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "Apache-2.0"}
authors = [{name = "Notary Contributors"}]
dependencies = [
    "requests>=2.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/notary_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
