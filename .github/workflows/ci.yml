name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run tests
        run: pytest -q

      - name: Build API Server image
        run: docker build -f docker/api_server.Dockerfile -t notary-api .

      - name: Build Replay Engine image
        run: docker build -f docker/replay_engine.Dockerfile -t notary-replay .
