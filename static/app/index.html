<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notary Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050812; --surface: #0d1320; --border: #1f2a3d;
    --text: #e5eefc; --muted: #91a4c0; --dim: #5b6b86;
    --accent: #3b82d4; --green: #22c55e; --amber: #f59e0b;
    --red: #ef4444; --purple: #7c5cd8;
  }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Sidebar */
  .side { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .side-brand { padding: 16px; font-weight: 800; font-size: 15px; color: var(--text); border-bottom: 1px solid var(--border); letter-spacing: 0.3px; }
  .side-brand span { color: var(--accent); }
  .side-nav { flex: 1; overflow-y: auto; padding: 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(59,130,212,.1); color: var(--text); }
  .nav-item.active { background: rgba(59,130,212,.18); color: var(--accent); }
  .nav-item .ico { width: 18px; text-align: center; font-size: 14px; }
  .nav-env { padding: 8px 12px; margin-top: 8px; font-size: 10px; text-transform: uppercase; color: var(--dim); font-weight: 700; letter-spacing: 0.5px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .topbar h1 { font-size: 16px; font-weight: 700; }
  .topbar .env-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card h3 { font-size: 12px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .stat-val { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }

  .section-title { font-size: 14px; font-weight: 700; margin: 20px 0 12px; color: var(--text); }

  /* Queue */
  .queue-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: var(--surface); }
  .queue-item .badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; }
  .badge-needs_replay { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .badge-proof_ready { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .badge-needs_verification { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .queue-item .name { flex: 1; font-size: 13px; font-weight: 600; }

  .loading { color: var(--dim); font-size: 13px; font-style: italic; }
  .error { color: var(--red); font-size: 13px; }
  .empty { color: var(--dim); font-size: 13px; font-style: italic; padding: 24px; text-align: center; }

  /* Agent/System tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--dim); padding: 8px 12px; border-bottom: 1px solid var(--border); letter-spacing: 0.5px; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(31,42,61,.5); color: var(--muted); }
  td:first-child { font-weight: 600; color: var(--text); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-connected { background: var(--green); }
  .status-disconnected { background: var(--red); }
  .status-stale { background: var(--amber); }
  .status-planned { background: var(--dim); }
  .status-not_installed { background: var(--dim); }
  .status-unknown { background: var(--dim); }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="side">
  <div class="side-brand">◈ Notary <span>Platform</span></div>
  <div class="side-nav">
    <div class="nav-item active" data-view="home"><span class="ico">⌂</span> Home</div>
    <div class="nav-item" data-view="onboarding"><span class="ico">▶</span> Onboarding</div>
    <div class="nav-item" data-view="agents"><span class="ico">◆</span> Agents</div>
    <div class="nav-item" data-view="systems"><span class="ico">◎</span> Systems</div>
    <div class="nav-item" data-view="capture"><span class="ico">◈</span> Capture</div>
    <div class="nav-item" data-view="incidents"><span class="ico">⚠</span> Incidents</div>
    <div class="nav-item" data-view="replay"><span class="ico">↻</span> Replay & Verification</div>
    <div class="nav-item" data-view="proofs"><span class="ico">✓</span> Proofs</div>
    <div class="nav-item" data-view="scenarios"><span class="ico">▤</span> Scenarios</div>
    <div class="nav-item" data-view="governance"><span class="ico">⚖</span> Governance</div>
    <div class="nav-item" data-view="settings"><span class="ico">⚙</span> Settings</div>
    <div class="nav-env">Environment</div>
    <div class="nav-item" data-view="env-select" style="font-size:12px;color:var(--amber);"><span class="ico">◉</span> Demo</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1 id="view-title">Home</h1>
    <span class="env-badge">Demo</span>
  </div>
  <div class="content" id="content">
    <div class="loading">Loading platform data…</div>
  </div>
</div>

<script>
const API = "/v1/platform";
let data = {};

async function api(path) {
  const r = await fetch(`${API}${path}`);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

function qs(sel) { return document.querySelector(sel); }

// Router
document.querySelectorAll(".nav-item[data-view]").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".nav-item[data-view]").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    const view = el.getAttribute("data-view");
    qs("#view-title").textContent = view.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    renderView(view);
  });
});

// Views
async function renderView(view) {
  const c = qs("#content");
  c.innerHTML = `<div class="loading">Loading ${view}…</div>`;
  try {
    if (view === "home") await renderHome(c);
    else if (view === "agents") await renderTable(c, "agents", "Agents", ["name","risk_tier","sdk_status","sdk_version","last_seen","scenario_count"]);
    else if (view === "systems") await renderTable(c, "systems", "Systems", ["name","kind","status","capability"]);
    else if (view === "capture") await renderTable(c, "policies", "Capture Policies", ["name","coverage","status"]);
    else if (view === "onboarding" || view === "incidents" || view === "replay" || view === "proofs" || view === "scenarios" || view === "governance" || view === "settings" || view === "env-select") {
      renderPlaceholder(c, view);
    } else {
      c.innerHTML = `<div class="error">Unknown view: ${view}</div>`;
    }
  } catch(e) {
    c.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

async function renderHome(c) {
  data.home = await api("/home?environment_id=env:demo");
  data.queue = await api("/home/queue?environment_id=env:demo");
  data.org = await api("/org");

  const h = data.home;
  c.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="stat-val" style="color:var(--accent)">${h.agent_count}</div><div class="stat-label">Agents</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--purple)">${h.system_count}</div><div class="stat-label">Systems</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--amber)">${h.incident_count}</div><div class="stat-label">Incidents</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)">${h.replay_ready}</div><div class="stat-label">Replay Ready</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)">${h.fixes_verified}</div><div class="stat-label">Fixes Verified</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--accent)">${h.proofs_issued}</div><div class="stat-label">Proofs Issued</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--purple)">${h.scenario_count}</div><div class="stat-label">Scenarios</div></div>
    </div>
    <div class="section-title">Pending Actions</div>
    <div id="queue">${renderQueue(data.queue)}</div>
    <div class="section-title">Organization</div>
    <div class="card">
      <h3>Organization</h3>
      <p style="font-size:13px;color:var(--muted)">${data.org.name}</p>
      <p style="font-size:11px;color:var(--dim);margin-top:4px">Environments: ${data.org.environments.join(", ")}</p>
    </div>
  `;
}

function renderQueue(queue) {
  if (!queue || queue.length === 0) return `<div class="empty">No pending actions. All caught up.</div>`;
  return queue.map(item => {
    const action = item.next_action;
    const label = action.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    return `<div class="queue-item"><span class="badge badge-${action}">${label}</span><span class="name">${item.incident_id}</span><span style="font-size:11px;color:var(--dim)">${item.status}</span></div>`;
  }).join("");
}

async function renderTable(c, endpoint, title, fields) {
  const items = await api(`/org/${endpoint}?environment_id=env:demo`);
  if (!items || items.length === 0) {
    c.innerHTML = `<div class="empty">No ${title.toLowerCase()} found in this environment.</div>`;
    return;
  }
  const fieldLabels = {
    name: "Name", risk_tier: "Risk Tier", sdk_status: "SDK Status",
    sdk_version: "Version", last_seen: "Last Seen", scenario_count: "Scenarios",
    kind: "Type", status: "Status", capability: "Capability", coverage: "Coverage"
  };
  let html = `<div class="table-wrap"><table><thead><tr>${fields.map(f => `<th>${fieldLabels[f]||f}</th>`).join("")}</tr></thead><tbody>`;
  for (const item of items) {
    html += `<tr>${fields.map(f => {
      let val = item[f] ?? "—";
      if (f === "sdk_status" || f === "status") val = `<span class="status-dot status-${val}"></span>${val.replace(/_/g, " ")}`;
      return `<td>${val}</td>`;
    }).join("")}</tr>`;
  }
  html += `</tbody></table></div>`;
  c.innerHTML = html;
}

function renderPlaceholder(c, view) {
  const labels = {
    onboarding: "Onboarding & SDK setup guidance available in the Agents view.",
    incidents: "Incident Investigation module — coming in the next build pass.",
    replay: "Replay & Fix Verification workflow — coming in the next build pass.",
    proofs: "Proof Center — coming in the next build pass.",
    scenarios: "Scenario Library & Release Gates — coming in the next build pass.",
    governance: "Governance, labels, claim scope, and compliance mapping — planned.",
    settings: "Settings for users, keys, environments — planned.",
    "env-select": "Environment selector. Current: Demo. Staging and Production environments are configured but not yet switchable in this view."
  };
  c.innerHTML = `<div class="card"><h3>${view.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase())}</h3><p style="font-size:13px;color:var(--muted);margin-top:8px">${labels[view] || "This module is in development."}</p></div>`;
}

// Load home on start
renderView("home");
</script>
</body>
</html>
