<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notary Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050812; --surface: #0d1320; --border: #1f2a3d;
    --text: #e5eefc; --muted: #91a4c0; --dim: #5b6b86;
    --accent: #3b82d4; --green: #22c55e; --amber: #f59e0b;
    --red: #ef4444; --purple: #7c5cd8; --radius: 10px;
  }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
  .side { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .side-brand { padding: 16px; font-weight: 800; font-size: 15px; color: var(--text); border-bottom: 1px solid var(--border); letter-spacing: 0.3px; }
  .side-brand span { color: var(--accent); }
  .side-nav { flex: 1; overflow-y: auto; padding: 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: rgba(59,130,212,.1); color: var(--text); }
  .nav-item.active { background: rgba(59,130,212,.18); color: var(--accent); }
  .nav-env { padding: 8px 12px; margin-top: 8px; font-size: 10px; text-transform: uppercase; color: var(--dim); font-weight: 700; letter-spacing: 0.5px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }
  .topbar h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .env-select { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer; }
  .env-select option { background: var(--surface); color: var(--text); }
  .demo-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.3); text-transform: uppercase; }
  .demo-banner { padding: 8px 16px; background: rgba(245,158,11,.08); border-bottom: 1px solid rgba(245,158,11,.2); color: var(--amber); font-size: 12px; font-weight: 600; text-align: center; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; position: relative; }
  .stat-val { font-size: 24px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }
  .stat-icon { font-size: 14px; position: absolute; top: 12px; right: 14px; }
  .section-title { font-size: 13px; font-weight: 800; margin: 20px 0 10px; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; }
  .queue-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .queue-chip { flex: 1; padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: .15s; display: flex; align-items: center; gap: 10px; }
  .queue-chip:hover { border-color: var(--accent); }
  .queue-count { font-size: 22px; font-weight: 800; }
  .queue-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--dim); padding: 8px 12px; border-bottom: 1px solid var(--border); letter-spacing: 0.5px; position: sticky; top: 0; background: var(--bg); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(31,42,61,.5); color: var(--muted); }
  td:first-child { font-weight: 600; color: var(--text); }
  tr { cursor: pointer; transition: .1s; }
  tr:hover { background: rgba(59,130,212,.06); }
  .badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; display: inline-block; }
  .badge-ingested { background: rgba(156,163,175,.12); color: #9ca3af; border: 1px solid rgba(156,163,175,.3); }
  .badge-replayed { background: rgba(59,130,212,.12); color: #3b82d4; border: 1px solid rgba(59,130,212,.3); }
  .badge-mitigated { background: rgba(245,158,11,.12); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
  .badge-certified { background: rgba(34,197,94,.12); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
  .badge-demo { background: rgba(245,158,11,.12); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
  .badge-planned { background: rgba(107,114,128,.12); color: #6b7280; border: 1px solid rgba(107,114,128,.3); }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
  .status-connected { background: var(--green); } .status-disconnected { background: var(--red); }
  .status-stale { background: var(--amber); } .status-planned { background: var(--dim); }
  .status-not_installed { background: var(--dim); } .status-unknown { background: var(--dim); }
  .btn { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--accent); background: var(--accent); color: #fff; cursor: pointer; transition: .15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
  .btn:hover { opacity: .85; }
  .btn-sm { font-size: 11px; padding: 4px 10px; }
  .btn-outline { background: transparent; color: var(--accent); }
  .btn-outline:hover { background: rgba(59,130,212,.1); }
  .btn-disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-amber { background: var(--amber); border-color: var(--amber); color: #000; }
  .btn-red { background: var(--red); border-color: var(--red); color: #fff; }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .drawer-overlay { position: fixed; inset: 0; background: rgba(5,8,18,.5); display: flex; align-items: stretch; justify-content: flex-end; z-index: 200; }
  .drawer { background: rgba(13,19,32,.98); width: 460px; max-width: 95vw; height: 100%; overflow-y: auto; border-left: 1px solid var(--border); box-shadow: -8px 0 24px rgba(0,0,0,.35); }
  .drawer-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(13,19,32,.98); z-index: 1; }
  .drawer-body { padding: 14px 18px; }
  .skeleton { background: rgba(31,42,61,.5); border-radius: var(--radius); animation: sk-pulse 1.5s infinite; }
  @keyframes sk-pulse { 0%,100% { opacity: .4; } 50% { opacity: .7; } }
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-state h3 { font-size: 15px; font-weight: 700; margin: 12px 0 8px; }
  .empty-state p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .error-state { text-align: center; padding: 48px 24px; }
  .error-state p { font-size: 13px; color: var(--red); margin: 12px 0; }
  .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-pill { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: .15s; }
  .filter-pill.active { background: rgba(59,130,212,.18); color: var(--accent); border-color: var(--accent); }
  .hidden { display: none !important; }
  pre { background: #111827; color: var(--green); padding: 8px 12px; border-radius: 6px; font-size: 11px; overflow-x: auto; margin-top: 8px; }
  .kv { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(31,42,61,.4); }
  .kv-label { color: var(--dim); font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .kv-value { color: var(--text); font-size: 12px; font-weight: 600; }
  section { margin-bottom: 20px; }
</style>
</head>
<body>

<div class="side">
  <div class="side-brand">◈ Notary <span>Platform</span></div>
  <div class="side-nav">
    <button class="nav-item active" data-view="home">⌂ Home</button>
    <button class="nav-item" data-view="onboarding">▶ Onboarding</button>
    <button class="nav-item" data-view="agents">◆ Agents</button>
    <button class="nav-item" data-view="systems">◎ Systems</button>
    <button class="nav-item" data-view="capture">◈ Capture</button>
    <button class="nav-item" data-view="incidents">⚠ Incidents</button>
    <button class="nav-item" data-view="replay">↻ Replay & Verify</button>
    <button class="nav-item" data-view="proofs">✓ Proofs</button>
    <button class="nav-item" data-view="scenarios">▤ Scenarios</button>
    <button class="nav-item" data-view="governance">⚖ Governance</button>
    <button class="nav-item" data-view="settings">⚙ Settings</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1 id="view-title">Home</h1>
    <select class="env-select" id="env-select" onchange="switchEnv(this.value)">
      <option value="env:demo">Demo</option>
      <option value="env:staging">Staging</option>
      <option value="env:production">Production</option>
    </select>
    <span class="demo-badge hidden" id="global-demo-badge">DEMO</span>
    <span style="margin-left:auto;font-size:11px;color:var(--dim)" id="org-name"></span>
  </div>
  <div class="demo-banner hidden" id="demo-banner">Demo data — not production. Seed demo incidents to explore.</div>
  <div class="content" id="content"><div class="skeleton" style="height:200px"></div></div>
</div>

<div id="drawer-container"></div>

<script>
const API = "/v1";
let state = { env: localStorage.getItem("np-env") || "env:demo", view: "home", data: {} };

function qs(s) { return document.querySelector(s); }
function qsa(s) { return document.querySelectorAll(s); }
async function api(path) { const r = await fetch(path); if(!r.ok) throw new Error(r.status); return r.json(); }
async function apiPost(path, body) { const r = await fetch(path, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}); if(!r.ok) throw new Error(r.status); return r.json(); }

function badge(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}
function demoBadge() { return state.env==="env:demo"?'<span class="badge badge-demo">DEMO</span>':''; }
function planBadge() { return '<span class="badge badge-planned">PLANNED</span>'; }
function skeleton(h) { return `<div class="skeleton" style="height:${h}px;margin-bottom:12px"></div>`; }
function empty(title, msg, btn, act) { return `<div class="empty-state"><h3>${title}</h3><p>${msg}</p>${btn?`<button class="btn" onclick="${act}">${btn}</button>`:''}</div>`; }
function error(msg) { return `<div class="error-state"><p>⚠ ${msg}</p><button class="btn" onclick="render()">Retry</button></div>`; }

qsa(".nav-item[data-view]").forEach(el => {
  el.addEventListener("click", () => {
    qsa(".nav-item[data-view]").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
    state.view = el.getAttribute("data-view");
    render();
  });
});

function switchEnv(envId) { state.env=envId; localStorage.setItem("np-env",envId); render(); }

const savedEnv = localStorage.getItem("np-env");
if(savedEnv) { state.env=savedEnv; qs("#env-select").value=savedEnv; }

async function render() {
  const c = qs("#content");
  const title = state.view.replace(/-/g," ").replace(/\b\w/g,x=>x.toUpperCase());
  qs("#view-title").textContent=title;
  const isDemo=state.env==="env:demo";
  qs("#demo-banner").classList.toggle("hidden",!isDemo);
  qs("#global-demo-badge").classList.toggle("hidden",!isDemo);

  c.innerHTML = skeleton(120)+skeleton(80)+skeleton(60);

  try {
    const envParam = "?environment_id="+state.env;
    if(state.view==="home") {
      const home = await api("/v1/platform/home"+envParam);
      renderHome(c,home);
    } else if(state.view==="onboarding") renderOnboarding(c);
    else if(state.view==="agents") {
      const d = await api("/v1/platform/org/agents"+envParam);
      state.data.agents=d; renderAgents(c,d);
    } else if(state.view==="systems") {
      const d = await api("/v1/platform/org/systems"+envParam);
      renderSystems(c,d);
    } else if(state.view==="capture") {
      const d = await api("/v1/platform/org/policies"+envParam);
      renderCapture(c,d);
    } else if(state.view==="incidents") {
      const d = await api("/v1/incidents");
      state.data.incidents=d; renderIncidents(c,d);
    } else if(state.view==="replay") renderReplay(c);
    else if(state.view==="proofs") renderProofs(c);
    else if(state.view==="scenarios") renderScenarios(c);
    else if(state.view==="governance") renderGovernance(c);
    else if(state.view==="settings") renderSettings(c);
    else if(state.view==="investigation") renderInvestigation(c);
    else c.innerHTML=error("Unknown view");
  } catch(e) {
    c.innerHTML=error("Could not load. Is the API running? ("+e.message+")");
  }
}

function renderHome(c,h) {
  const sh=h.setup_health||{}, q=h.queues||{}, proofs=h.recent_proofs||[], na=h.next_action;
  qs("#org-name").textContent = "Acme Assurance Demo";
  const stats = [
    {c:"var(--green)",i:"✓",v:sh.sdk_installed?"Yes":"No",l:"SDK Installed"},
    {c:"var(--accent)",i:"◆",v:sh.agents_instrumented||0,l:"Agents"},
    {c:"var(--purple)",i:"◎",v:(sh.systems_connected||0)+"/"+(sh.systems_total||0),l:"Systems"},
    {c:"var(--blue)",i:"◈",v:sh.capture_policies||0,l:"Policies"},
    {c:"var(--amber)",i:"⚠",v:sh.incidents_collected||0,l:"Incidents"},
    {c:"var(--green)",i:"✓",v:sh.proofs_issued||0,l:"Proofs"},
  ];
  c.innerHTML = `
    ${h.is_demo?`<div style="margin-bottom:16px;font-size:12px;color:var(--amber);font-weight:600">${demoBadge()} Demo data — not production</div>`:''}
    <div class="stat-grid">${stats.map(s=>`<div class="stat"><div class="stat-icon" style="color:${s.c}">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join("")}</div>
    <div class="section-title">Active Queues</div>
    <div class="queue-row">
      ${chip(q.needs_replay||0,"Need replay","--red","incidents")}
      ${chip(q.needs_verification||0,"Need verification","--amber","incidents")}
      ${chip(q.proofs_ready||0,"Proofs ready","--green","incidents")}
    </div>
    ${proofs.length?`
      <div class="section-title">Recent Proofs</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
        ${proofs.map(p=>`<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:12px;cursor:pointer" onclick="navigate('proofs')"><span style="font-weight:700;color:var(--text)">${p.incident_id}</span><span style="color:var(--muted)">${p.agent}</span><span class="badge badge-certified" style="margin-left:auto">${p.status}</span></div>`).join("")}
      </div>`:''}
    ${na?`
      <div class="section-title">Next Action</div>
      <div class="stat" style="cursor:pointer;border:2px solid var(--accent)" onclick="navigate('incidents')">
        <div style="font-size:14px;font-weight:700;color:var(--accent)">${na.label}</div>
        <div class="stat-label" style="margin-top:4px">Click to open incidents</div>
      </div>`:'<div class="section-title" style="color:var(--green)">✓ All caught up</div>'}
  `;
}

function chip(count,label,color,view) {
  return `<div class="queue-chip" onclick="navigate('${view}')" style="border-left:3px solid var(${color})">
    <div class="queue-count" style="color:var(${color})">${count}</div>
    <div class="queue-label">${label}</div>
  </div>`;
}

function navigate(view) {
  state.view=view.replace(/[?].*/,"");
  qsa(".nav-item[data-view]").forEach(x=>x.classList.remove("active"));
  const btn=qs(`.nav-item[data-view="${state.view}"]`);
  if(btn) btn.classList.add("active");
  render();
}

function renderOnboarding(c) {
  c.innerHTML = [
    {n:1,title:"Install SDK",desc:"Run this in your agent environment:",code:"pip install notary-sdk"},
    {n:2,title:"Instrument an Agent",desc:"Wrap your decision function:",code:'@notary.capture\ndef my_agent(req):\n    return decision'},
    {n:3,title:"Send Test Capture",action:"Run Test Capture",onclick:"runTestCapture()"},
    {n:4,title:"Connect Systems",desc:"Configure your external connections.",link:"systems",linkLabel:"Go to Systems →"},
    {n:5,title:"Create Capture Policy",desc:"Define what gets captured.",link:"capture",linkLabel:"Go to Capture →"},
    {n:6,title:"View First Incident",desc:"Results appear here after capture.",link:"incidents",linkLabel:"Go to Incidents →"},
  ].map(s=>`<div class="stat" style="margin-bottom:12px;display:flex;gap:14px;align-items:flex-start">
    <div style="width:28px;height:28px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0">${s.n}</div>
    <div style="flex:1"><div style="font-size:14px;font-weight:700">${s.title}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">${s.desc||''}</div>
    ${s.code?`<pre>${s.code}</pre>`:''}
    ${s.action?`<button class="btn btn-sm" style="margin-top:8px" onclick="${s.onclick}">${s.action}</button>`:''}
    ${s.link?`<a href="#" style="color:var(--accent);font-size:12px;font-weight:600;display:inline-block;margin-top:8px" onclick="navigate('${s.link}');return false">${s.linkLabel}</a>`:''}</div></div>`).join("");
}

async function runTestCapture() {
  const c=qs("#content");
  c.innerHTML='<div class="skeleton" style="height:40px;margin-bottom:12px"></div><p style="color:var(--muted);font-size:13px">Running test capture...</p>';
  try {
    await apiPost("/v1/platform/seed-demo");
    c.innerHTML='<div style="text-align:center;padding:32px"><div style="font-size:48px">✓</div><h3 style="color:var(--green);margin-top:12px">Capture successful!</h3><p style="color:var(--muted);font-size:13px">5 demo incidents created.</p><button class="btn" style="margin-top:12px" onclick="navigate(\'incidents\')">View Incidents</button></div>';
  } catch(e) { c.innerHTML=error("Capture failed."); }
}

function renderAgents(c,d) {
  if(!d.length) { c.innerHTML=empty("No Agents","Register an agent to get started.","Register Agent","alert('Coming soon')"); return; }
  c.innerHTML=`<div style="margin-bottom:16px"><button class="btn btn-sm btn-outline" onclick="alert('Coming soon')">+ Register Agent</button></div>
    <table><thead><tr><th>Name</th><th>Risk</th><th>SDK</th><th>Version</th><th>Last Seen</th></tr></thead>
    <tbody>${d.map(a=>`<tr onclick="openAgentDrawer('${a.id}')"><td>${demoBadge()} ${a.name}</td><td>${a.risk_tier}</td><td><span class="status-dot status-${a.sdk_status}"></span>${a.sdk_status.replace(/_/g,' ')}</td><td>${a.sdk_version||'—'}</td><td>${a.last_seen?new Date(a.last_seen).toLocaleDateString():'—'}</td></tr>`).join("")}</tbody></table>`;
}

function openAgentDrawer(id) {
  const agents=state.data.agents||[];
  const a=agents.find(x=>x.id===id);
  if(!a) return;
  qs("#drawer-container").innerHTML=`
    <div class="drawer-overlay" onclick="this.innerHTML=''"><div class="drawer" onclick="event.stopPropagation()">
      <div class="drawer-header"><span style="font-weight:800;font-size:13px">${a.name}</span><button class="btn btn-sm btn-outline" onclick="this.closest('.drawer-overlay').remove()">✕</button></div>
      <div class="drawer-body">${demoBadge()}
        <div class="kv"><span class="kv-label">Risk Tier</span><span class="kv-value">${a.risk_tier}</span></div>
        <div class="kv"><span class="kv-label">SDK Status</span><span class="kv-value"><span class="status-dot status-${a.sdk_status}"></span>${a.sdk_status.replace(/_/g,' ')}</span></div>
        <div class="kv"><span class="kv-label">Version</span><span class="kv-value">${a.sdk_version||'—'}</span></div>
        <div class="kv"><span class="kv-label">Last Seen</span><span class="kv-value">${a.last_seen?new Date(a.last_seen).toLocaleDateString():'—'}</span></div>
      </div></div></div>`;
}

function renderSystems(c,d) {
  if(!d.length) { c.innerHTML=empty("No Systems","Connect an external system to get started."); return; }
  c.innerHTML=`<table><thead><tr><th>Name</th><th>Type</th><th>Status</th><th>Capability</th></tr></thead><tbody>${d.map(s=>`<tr><td>${demoBadge()} ${s.name}</td><td>${s.kind}</td><td><span class="status-dot status-${s.status}"></span>${s.status}</td><td>${s.capability||'—'}</td></tr>`).join("")}</tbody></table>`;
}

function renderCapture(c,d) {
  if(!d.length) { c.innerHTML=empty("No Policies","Create a capture policy to define what gets recorded."); return; }
  c.innerHTML=`<table><thead><tr><th>Policy</th><th>Coverage</th><th>Status</th></tr></thead><tbody>${d.map(p=>`<tr><td>${demoBadge()} ${p.name}</td><td>${p.coverage}</td><td>${p.status}</td></tr>`).join("")}</tbody></table>`;
}

function renderIncidents(c,d) {
  if(!d.length) { c.innerHTML=empty("No Incidents","Incidents appear when Notary captures a decision.","Seed Demo Data","seedDemo()"); return; }
  c.innerHTML=`<div class="filter-pills">${["all","ingested","replayed","mitigated","certified"].map(s=>`<button class="filter-pill${s==='all'?' active':''}" onclick="filterIncidents('${s}',this)">${s.replace(/^./,x=>x.toUpperCase())} (${d.filter(i=>s==='all'||i.status===s).length})</button>`).join("")}</div>
    <div style="margin-bottom:12px"><button class="btn btn-sm btn-outline" onclick="seedDemo()">Seed Demo Data</button></div>
    <table><thead><tr><th>ID</th><th>Status</th><th>Replay</th><th>Fix</th><th>Cert</th><th>Actions</th></tr></thead>
    <tbody>${d.map(i=>incidentRow(i)).join("")}</tbody></table>`;
}

function incidentRow(inc) {
  const hasRep=inc.replay_result&&Object.keys(inc.replay_result).length>0;
  const hasFix=inc.mutation_result&&Object.keys(inc.mutation_result).length>0;
  const hasCrt=inc.certificate&&Object.keys(inc.certificate).length>0;
  return `<tr class="inc-row" data-status="${inc.status}">
    <td>${demoBadge()} <span style="text-decoration:underline" onclick="openInvestigation('${inc.incident_id}')">${inc.incident_id}</span></td>
    <td>${badge(inc.status)}</td>
    <td>${hasRep?'✓':'—'}</td>
    <td>${hasFix?'✓':'—'}</td>
    <td>${hasCrt?'✓':'—'}</td>
    <td class="action-row">
      ${!hasRep?`<button class="btn btn-sm" onclick="act('${inc.incident_id}','replay')">Replay</button>`:''}
      ${hasRep&&!hasFix?`<button class="btn btn-sm btn-amber" onclick="act('${inc.incident_id}','verify')">Verify Fix</button>`:''}
      ${hasFix&&!hasCrt?`<button class="btn btn-sm btn-green" onclick="act('${inc.incident_id}','certify')">Issue Proof</button>`:''}
      <button class="btn btn-sm btn-outline" onclick="openInvestigation('${inc.incident_id}')">Investigate</button>
    </td>
  </tr>`;
}

async function act(id,action) {
  const c=qs("#content");
  try {
    if(action==="replay") { await apiPost("/v1/incidents/"+id+"/replay"); render(); }
    else if(action==="verify") { await apiPost("/v1/incidents/"+id+"/mutation-tests",{"fix_config":{"threshold":620},"expected_correct_behavior":"APPROVE"}); render(); }
    else if(action==="certify") { await apiPost("/v1/incidents/"+id+"/certificates"); render(); }
  } catch(e) { c.innerHTML=error("Action failed: "+e.message); }
}

function filterIncidents(status,btn) {
  qsa(".filter-pill").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  qsa(".inc-row").forEach(r=>r.classList.toggle("hidden",status!=="all"&&r.dataset.status!==status));
}

async function seedDemo() {
  const c=qs("#content"); c.innerHTML='<div class="skeleton" style="height:40px;margin-bottom:12px"></div><p style="color:var(--muted)">Seeding demo data...</p>';
  try { await apiPost("/v1/platform/seed-demo"); render(); } catch(e) { c.innerHTML=error("Seed failed."); }
}

async function openInvestigation(id) {
  state.view="investigation"; qs("#view-title").textContent="Incident: "+id;
  const c=qs("#content"); c.innerHTML=skeleton(40)+skeleton(200);
  try {
    const inc=await api("/v1/incidents/"+id);
    const cert=inc.certificate&&Object.keys(inc.certificate).length>0?inc.certificate:null;
    let certValid=null; if(cert) { try{const v=await api("/v1/incidents/"+id+"/certificates/pom-cert-v1/verify"); certValid=v.signature_valid;}catch(e){} }
    c.innerHTML=`
      <button class="btn btn-sm btn-outline" style="margin-bottom:16px" onclick="navigate('incidents')">← Back to Incidents</button>
      ${demoBadge()}
      <div style="display:flex;gap:12px;align-items:center;margin:8px 0 16px">${badge(inc.status)}<span style="font-size:13px;color:var(--muted)">ID: ${inc.incident_id}</span></div>
      <section>
        <div class="section-title" style="margin-top:0">Workflow Timeline</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${step("Captured",true)}${step("Replayed",hasRep(inc))}${step("Fix Verified",hasFix(inc))}${step("Certified",hasCert(inc))}
        </div>
      </section>
      <section>
        <div class="section-title">Evidence</div>
        <div class="kv"><span class="kv-label">Root Hash</span><span class="kv-value" style="font-family:monospace;font-size:11px">${(inc.snapshot_summary?.root_hash||'—').substring(0,20)}...</span></div>
        <div class="kv"><span class="kv-label">Elements</span><span class="kv-value">${inc.snapshot_summary?.element_count||'—'}</span></div>
        <div class="kv"><span class="kv-label">Schema</span><span class="kv-value">v${inc.snapshot_summary?.schema_version||'—'}</span></div>
      </section>
      ${hasRep(inc)?`<section><div class="section-title">Replay</div><div class="kv"><span class="kv-label">Decision</span><span class="kv-value" style="font-weight:800">${inc.replay_result.decision||'—'}</span></div><div class="kv"><span class="kv-label">Status</span><span class="kv-value">${inc.replay_result.replay_status||'—'}</span></div></section>`:''}
      ${hasFix(inc)?`<section><div class="section-title">Fix Verification</div><div class="kv"><span class="kv-label">Original</span><span class="kv-value">${inc.mutation_result.original_decision}</span></div><div class="kv"><span class="kv-label">Mutated</span><span class="kv-value" style="color:${inc.mutation_result.mitigated?'var(--green)':'var(--red)'}">${inc.mutation_result.mutated_decision}</span></div><div class="kv"><span class="kv-label">Mitigated</span><span class="kv-value">${inc.mutation_result.mitigated?'✓ Yes':'✗ No'}</span></div></section>`:''}
      ${cert?`<section><div class="section-title">Proof</div><div class="kv"><span class="kv-label">Certificate</span><span class="kv-value">${cert.certificate_id}</span></div><div class="kv"><span class="kv-label">Algorithm</span><span class="kv-value" style="font-family:monospace;font-size:11px">${cert.signing_algorithm}</span></div><div class="kv"><span class="kv-label">Signature Valid</span><span class="kv-value" style="color:${certValid===true?'var(--green)':'var(--red)'}">${certValid===true?'✓ Yes':certValid===false?'✗ No':'Unknown'}</span></div></section>`:''}
      ${inc.custody?.length?`<section><div class="section-title">Custody Chain</div>${inc.custody.map(c=>`<div style="padding:6px 0;border-bottom:1px solid rgba(31,42,61,.3);font-size:12px"><span style="font-weight:700;color:var(--text)">${c.action}</span><span style="color:var(--dim)"> by ${c.actor}</span><span style="color:var(--muted);margin-left:8px">${c.detail}</span><span style="color:var(--dim);float:right">${new Date(c.timestamp).toLocaleDateString()}</span></div>`).join("")}</section>`:''}
      <div class="action-row" style="margin-top:16px">
        ${!hasRep(inc)?`<button class="btn" onclick="act('${id}','replay');openInvestigation('${id}')">Run Replay</button>`:''}
        ${hasRep(inc)&&!hasFix(inc)?`<button class="btn btn-amber" onclick="act('${id}','verify');openInvestigation('${id}')">Verify Fix</button>`:''}
        ${hasFix(inc)&&!hasCert(inc)?`<button class="btn btn-green" onclick="act('${id}','certify');openInvestigation('${id}')">Issue Proof</button>`:''}
      </div>`;
  } catch(e) { c.innerHTML=error("Incident not found: "+e.message); }
}

function step(label,done) { return `<div style="padding:6px 14px;border-radius:var(--radius);border:1px solid ${done?'var(--green)':'var(--border)'};background:${done?'rgba(34,197,94,.08)':'transparent'};font-size:12px;font-weight:700;color:${done?'var(--green)':'var(--dim)'}">${done?'✓ ':''}${label}</div>`; }
function hasRep(i) { return i.replay_result&&Object.keys(i.replay_result).length>0; }
function hasFix(i) { return i.mutation_result&&Object.keys(i.mutation_result).length>0; }
function hasCert(i) { return i.certificate&&Object.keys(i.certificate).length>0; }

function renderReplay(c) { c.innerHTML=empty("Replay & Verification","Select an incident from Incidents to begin the workflow.",null,null); }
async function renderProofs(c) {
  try {
    const all=await api("/v1/incidents");
    const cert=all.filter(i=>i.certificate&&Object.keys(i.certificate).length>0);
    if(!cert.length) { c.innerHTML=empty("No Proofs","Issue a proof from a mitigated incident.","Go to Incidents","navigate('incidents')"); return; }
    c.innerHTML=`<table><thead><tr><th>Certificate</th><th>Incident</th><th>Algorithm</th><th>Actions</th></tr></thead><tbody>${cert.map(i=>`
      <tr><td>${demoBadge()} ${i.certificate.certificate_id}</td>
      <td><span style="text-decoration:underline;cursor:pointer" onclick="openInvestigation('${i.incident_id}')">${i.incident_id}</span></td>
      <td style="font-size:10px;font-family:monospace">${i.certificate.signing_algorithm}</td>
      <td class="action-row">
        <button class="btn btn-sm btn-outline" onclick="verifyCert('${i.incident_id}')">Verify</button>
        <a href="/v1/incidents/${i.incident_id}/certificates/pom-cert-v1/download" class="btn btn-sm btn-outline" style="text-decoration:none">Download</a>
      </td></tr>`).join("")}</tbody></table>`;
  } catch(e) { c.innerHTML=error("Could not load proofs."); }
}

async function verifyCert(id) { try{const v=await api("/v1/incidents/"+id+"/certificates/pom-cert-v1/verify"); alert(v.signature_valid?"Signature valid ✓":"Signature invalid ✗");}catch(e){alert("Verification failed");} }

function renderScenarios(c) { c.innerHTML=empty("Scenarios","Scenario testing is planned and not yet available.",null,null); }
function renderGovernance(c) {
  c.innerHTML=["Labels","Claim Scope","Regulatory Mappings","Retention","Audit Events"].map(s=>`<div class="stat" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">${s}</span>${planBadge()}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Planned — not yet available.</div></div>`).join("");
}
function renderSettings(c) {
  c.innerHTML=`<div class="stat" style="margin-bottom:12px"><div style="font-size:14px;font-weight:700">Organization</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Acme Assurance Demo</div><div style="font-size:11px;color:var(--dim);margin-top:4px">ID: org:acme-demo</div></div>
  ${["Users & Roles","API Keys","Integrations","Entitlements"].map(s=>`<div class="stat" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">${s}</span>${planBadge()}</div></div>`).join("")}`;
}

render();
</script>
</body>
</html>
