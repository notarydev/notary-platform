<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notary Platform</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050812;--surface:#0d1320;--border:#1f2a3d;--text:#e5eefc;--muted:#91a4c0;--dim:#5b6b86;--accent:#3b82d4;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#7c5cd8;--radius:10px}
body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
.side{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.side-brand{padding:16px;font-weight:800;font-size:15px;color:var(--text);border-bottom:1px solid var(--border);letter-spacing:.3px}
.side-brand span{color:var(--accent)}
.side-nav{flex:1;overflow-y:auto;padding:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(59,130,212,.1);color:var(--text)}
.nav-item.active{background:rgba(59,130,212,.18);color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:700}
.env-select{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:24px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-val{font-size:24px;font-weight:800;line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600}
.stat-icon{font-size:14px;position:absolute;top:12px;right:14px}
.section-title{font-size:13px;font-weight:800;margin:20px 0 10px;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.queue-row{display:flex;gap:12px;margin-bottom:24px}
.queue-chip{flex:1;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
.queue-chip:hover{border-color:var(--accent)}
.queue-count{font-size:22px;font-weight:800}
.queue-label{font-size:12px;color:var(--muted);font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;color:var(--dim);padding:8px 12px;border-bottom:1px solid var(--border);letter-spacing:.5px;position:sticky;top:0;background:var(--bg)}
td{padding:10px 12px;border-bottom:1px solid rgba(31,42,61,.5);color:var(--muted)}
td:first-child{font-weight:600;color:var(--text)}
tr{cursor:pointer;transition:.1s}tr:hover{background:rgba(59,130,212,.06)}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;text-transform:uppercase;display:inline-block}
.badge-ingested{background:rgba(156,163,175,.12);color:#9ca3af;border:1px solid rgba(156,163,175,.3)}
.badge-replayed,.badge-replayable{background:rgba(59,130,212,.12);color:#3b82d4;border:1px solid rgba(59,130,212,.3)}
.badge-mitigated{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.badge-certified{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-demo{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.badge-planned{background:rgba(107,114,128,.12);color:#6b7280;border:1px solid rgba(107,114,128,.3)}
.badge-built{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-evidence_only{background:rgba(107,114,128,.12);color:#6b7280;border:1px solid rgba(107,114,128,.3)}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.status-connected{background:var(--green)}.status-disconnected{background:var(--red)}.status-stale{background:var(--amber)}.status-planned{background:var(--dim)}
.btn{font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{opacity:.85}.btn-sm{font-size:11px;padding:4px 10px}
.btn-outline{background:transparent;color:var(--accent)}
.btn-outline:hover{background:rgba(59,130,212,.1)}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-amber{background:var(--amber);border-color:var(--amber);color:#000}
.action-row{display:flex;gap:8px;flex-wrap:wrap}
.skeleton{background:rgba(31,42,61,.5);border-radius:var(--radius);animation:sk-pulse 1.5s infinite}
@keyframes sk-pulse{0%,100%{opacity:.4}50%{opacity:.7}}
.empty-state{text-align:center;padding:48px 24px}
.empty-state h3{font-size:15px;font-weight:700;margin:12px 0 8px}
.empty-state p{font-size:13px;color:var(--muted);margin-bottom:16px}
.error-state{text-align:center;padding:48px 24px}.error-state p{font-size:13px;color:var(--red);margin:12px 0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-pill{font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
.filter-pill.active{background:rgba(59,130,212,.18);color:var(--accent);border-color:var(--accent)}
.hidden{display:none!important}
pre{background:#111827;color:var(--green);padding:8px 12px;border-radius:6px;font-size:11px;overflow-x:auto;margin-top:8px}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(31,42,61,.4)}
.kv-label{color:var(--dim);font-size:11px;font-weight:700;text-transform:uppercase}
.kv-value{color:var(--text);font-size:12px;font-weight:600}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.int-card:hover{border-color:var(--accent)}
.int-card h4{font-size:14px;font-weight:700;margin-bottom:4px}
.int-card p{font-size:12px;color:var(--muted)}
.int-card .int-status{font-size:10px;font-weight:700;text-transform:uppercase;margin-top:8px;display:inline-block}
.flow-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0;font-size:11px;color:var(--muted)}
.flow-step{padding:4px 10px;border-radius:6px;background:rgba(17,24,39,.6);border:1px solid var(--border)}
.flow-arrow{color:var(--accent);font-weight:700}
.demo-banner{padding:8px 16px;background:rgba(245,158,11,.08);border-bottom:1px solid rgba(245,158,11,.2);color:var(--amber);font-size:12px;font-weight:600;text-align:center;flex-shrink:0}
section{margin-bottom:20px}.section-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.proof-bundle{border:2px solid var(--green);border-radius:var(--radius);padding:20px;background:rgba(34,197,94,.04)}
.proof-bundle h3{color:var(--green);margin-bottom:12px}
</style>
</head>
<body>
<div class="side">
  <div class="side-brand">◈ Notary <span>Platform</span></div>
  <div class="side-nav">
    <button class="nav-item active" data-view="home">⌂ Home</button>
    <button class="nav-item" data-view="setup">🔌 Setup</button>
    <button class="nav-item" data-view="verification-records">📋 Verification Records</button>
    <button class="nav-item" data-view="incidents">⚠ Incidents</button>
    <button class="nav-item" data-view="proofs">✓ Proofs</button>
    <button class="nav-item" data-view="scenarios">▤ Scenarios</button>
    <button class="nav-item" data-view="governance">⚖ Governance</button>
    <button class="nav-item" data-view="settings">⚙ Settings</button>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h1 id="view-title">Home</h1>
    <select class="env-select" id="env-select" onchange="switchEnv(this.value)"><option value="env:demo">Demo</option><option value="env:staging">Staging</option><option value="env:production">Production</option></select>
    <span class="badge badge-demo hidden" id="global-demo">DEMO</span>
    <span style="margin-left:auto;font-size:11px;color:var(--dim)" id="org-name"></span>
  </div>
  <div class="demo-banner hidden" id="demo-banner">Demo data — not production. A design partner preview.</div>
  <div class="content" id="content"><div class="skeleton" style="height:160px"></div></div>
</div>
<script>
const API="/v1";const AUTH="Bearer ntry-xcQYhyLfBgKtWGvq3t1ZG0hzYgRo7iFch_IaxUnW0R8";let S={env:localStorage.getItem("np-env")||"env:demo",view:"home"};
function q(s){return document.querySelector(s)}
function qa(s){return document.querySelectorAll(s)}
async function a(p){const r=await fetch(p,{headers:{"Authorization":AUTH}});if(!r.ok)throw Error(r.status);return r.json()}
async function ap(p,b){const r=await fetch(p,{method:"POST",headers:{"Content-Type":"application/json","Authorization":AUTH},body:JSON.stringify(b||{})});if(!r.ok)throw Error(r.status);return r.json()}
function ba(st){return`<span class="badge badge-${st}">${st.replace(/_/g," ")}</span>`}
function db(){return S.env==="env:demo"?'<span class="badge badge-demo">DEMO</span>':''}
function pb(){return'<span class="badge badge-planned">PLANNED</span>'}
function sk(h){return`<div class="skeleton" style="height:${h}px;margin-bottom:12px"></div>`}
function em(t,m,b,a){return`<div class="empty-state"><h3>${t}</h3><p>${m}</p>${b?`<button class="btn" onclick="${a}">${b}</button>`:""}</div>`}
function er(m){return`<div class="error-state"><p>⚠ ${m}</p><button class="btn" onclick="R()">Retry</button></div>`}

qa(".nav-item[data-view]").forEach(e=>{e.addEventListener("click",()=>{qa(".nav-item[data-view]").forEach(x=>x.classList.remove("active"));e.classList.add("active");S.view=e.dataset.view;R()})});
function switchEnv(v){S.env=v;localStorage.setItem("np-env",v);R()}
const se=localStorage.getItem("np-env");if(se){S.env=se;q("#env-select").value=se}

async function R(){
  const c=q("#content");c.innerHTML=sk(120)+sk(80);
  const d=S.env==="env:demo";q("#demo-banner").classList.toggle("hidden",!d);q("#global-demo").classList.toggle("hidden",!d);
  const ep="?environment_id="+S.env;
  try{
    if(S.view==="home"){const h=await a("/v1/platform/home"+ep);renderHome(c,h)}
    else if(S.view==="setup")renderSetup(c);
    else if(S.view==="verification-records"){const v=await a("/v1/verification-records");renderVRs(c,v)}
    else if(S.view==="incidents"){const i=await a("/v1/incidents");renderInc(c,i)}
    else if(S.view==="investigation")renderInv(c);
    else if(S.view==="proofs"){const i=await a("/v1/incidents");renderProofs(c,i)}
    else if(S.view==="scenarios")renderScenarios(c);
    else if(S.view==="governance")renderGov(c);
    else if(S.view==="settings")renderSet(c);
    else c.innerHTML=er("Unknown view");
  }catch(e){c.innerHTML=er("Could not load. Is the API running? ("+e.message+")");}
}

function nav(v){S.view=v;qa(".nav-item[data-view]").forEach(x=>x.classList.remove("active"));const b=q(`.nav-item[data-view="${v}"]`);if(b)b.classList.add("active");R()}

// ── HOME ──
function renderHome(c,h){
  const sh=h.setup_health||{},qu=h.queues||{},pf=h.recent_proofs||[],na=h.next_action;
  q("#org-name").textContent="Acme Assurance Demo";
  q("#view-title").textContent="Home";
  const st=[["var(--green)","✓",sh.sdk_installed?"Yes":"No","SDK Installed"],["var(--accent)","◆",sh.agents_instrumented||0,"Agents"],["var(--purple)","◎",(sh.systems_connected||0)+"/"+(sh.systems_total||0),"Systems"],["var(--blue)","◈",sh.capture_policies||0,"Policies"],["var(--amber)","⚠",sh.incidents_collected||0,"Incidents"],["var(--green)","✓",sh.proofs_issued||0,"Proofs"]];
  c.innerHTML=`
    ${h.is_demo?`<div style="margin-bottom:16px;font-size:12px;color:var(--amber);font-weight:600">${db()} Demo data — design partner preview</div>`:""}
    <div class="stat-grid">${st.map(s=>`<div class="stat"><div style="color:${s[0]};font-size:12px;font-weight:700;margin-bottom:4px">${s[1]}</div><div class="stat-val" style="color:${s[0]}">${s[2]}</div><div class="stat-label">${s[3]}</div></div>`).join("")}</div>
    <div class="section-title">Active Queues</div>
    <div class="queue-row">
      ${chip(qu.needs_replay||0,"Need replay","--red","verification-records")}
      ${chip(qu.needs_verification||0,"Need verification","--amber","incidents")}
      ${chip(qu.proofs_ready||0,"Proofs ready","--green","proofs")}
    </div>
    ${pf.length?`<div class="section-title">Recent Proofs</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">${pf.map(p=>`<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:12px"><span style="font-weight:700;color:var(--text)">${p.incident_id}</span><span class="badge badge-certified">certified</span></div>`).join("")}</div>`:""}
    ${na?`<div class="section-title">Next Action</div><div class="stat" style="cursor:pointer;border:2px solid var(--accent)" onclick="nav('incidents')"><div style="font-size:14px;font-weight:700;color:var(--accent)">${na.label}</div><div class="stat-label">Click to open incidents</div></div>`:""}
  `;
}
function chip(n,l,c,v){return`<div class="queue-chip" onclick="nav('${v}')" style="border-left:3px solid var(${c})"><div class="queue-count" style="color:var(${c})">${n}</div><div class="queue-label">${l}</div></div>`;}

// ── SETUP ──
function renderSetup(c){
  q("#view-title").textContent="Setup — Connect Your AI System";
  const paths=[
    {id:"python_sdk",title:"Python SDK",desc:"Best for Python agents and custom workflows.",status:"built",code:"pip install notary-sdk"},
    {id:"api_submission",title:"API Submission",desc:"Send JSON Verification Records from any backend.",status:"built",code:'curl -X POST /v1/verification-records'},
    {id:"manual_submission",title:"Manual Submission",desc:"Submit overrides, complaints, or disputes by hand.",status:"built",code:""},
    {id:"webhook",title:"Webhook",desc:"POST events from support systems or workflow tools.",status:"built",code:""},
    {id:"batch_import",title:"Batch Import",desc:"Import historical data via CSV/JSONL.",status:"planned",code:""},
    {id:"trace_import",title:"Trace Import",desc:"Ingest OpenTelemetry/OpenInference traces.",status:"planned",code:""},
  ];
  c.innerHTML=`
    <div class="section-title">Choose an integration path</div>
    <div class="section-sub">How do you want to connect your AI system to Notary?</div>
    ${paths.map(p=>`<div class="int-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h4>${p.title}</h4><p>${p.desc}</p></div>
        <span class="badge badge-${p.status==="built"?"built":"planned"}">${p.status}</span>
      </div>
      ${p.code?`<pre style="margin-top:8px">${p.code}</pre>`:""}
      ${p.status==="built"&&p.id==="python_sdk"?`<div style="margin-top:12px" class="action-row">
        <button class="btn btn-sm" onclick="alert('Tests pass: 54 passed. pip install notary-sdk from github.com/notarydev/notary-sdk')">Install Instructions</button>
        <button class="btn btn-sm btn-outline" onclick="submitManual()">Submit Manual Record</button>
      </div>`:""}
      ${p.status==="built"&&p.id==="api_submission"?`<div style="margin-top:12px"><button class="btn btn-sm" onclick="createVR()">Create Test Record</button></div>`:""}
      ${p.status==="built"&&p.id==="manual_submission"?`<div style="margin-top:12px"><button class="btn btn-sm" onclick="submitManual()">Submit Manual Override</button></div>`:""}
    </div>`).join("")}
    <div class="section-title" style="margin-top:24px">Capture adapter registry</div>
    <div class="section-sub">What capture methods are available today vs planned</div>
    <div id="adapter-table">${sk(40)}</div>
  `;
  a("/v1/platform/adapters").then(ads=>{
    q("#adapter-table").innerHTML=`<table><thead><tr><th>Adapter</th><th>Status</th><th>Description</th></tr></thead><tbody>${ads.map(ad=>`<tr><td style="font-weight:700;color:var(--text)">${ad.label}</td><td><span class="badge badge-${ad.status}">${ad.status}</span></td><td style="font-size:11px">${ad.desc}</td></tr>`).join("")}</tbody></table>`;
  }).catch(()=>{q("#adapter-table").innerHTML=`<p style="color:var(--dim);font-size:12px">Adapter registry unavailable</p>`;});
}

async function createVR(){ try{const r=await ap("/v1/verification-records?source_type=api_submission&external_ref=test-1");alert("Created: "+r.id);nav("verification-records")}catch(e){alert("Failed: "+e.message)}}
async function submitManual(){ try{const r=await ap("/v1/verification-records/manual",{ticket_id:"TKT-"+Date.now(),transcript:"Customer complained about loan denial",decision:"DENY"});alert("Submitted: "+r.id);nav("verification-records")}catch(e){alert("Failed: "+e.message)}}

// ── VERIFICATION RECORDS ──
function renderVRs(c,vrs){
  q("#view-title").textContent="Verification Records";
  const st=["all","replayable","requires_human_label","evidence_only","missing_context"];
  if(!vrs.length){c.innerHTML=em("No Verification Records","Submit a record from Setup or via the API.","Go to Setup","nav('setup')");return;}
  c.innerHTML=`
    <div class="filter-pills">${st.map(s=>`<button class="filter-pill${s==="all"?" active":""}" onclick="fVR('${s}',this)">${s.replace(/_/g," ").replace(/\b\w/g,x=>x.toUpperCase())} (${s==="all"?vrs.length:vrs.filter(v=>v.replayability===s).length})</button>`).join("")}</div>
    <table><thead><tr><th>ID</th><th>Source</th><th>Replayability</th><th>Label</th><th>Agent</th><th>Actions</th></tr></thead>
    <tbody>${vrs.map(v=>`<tr class="vr-row" data-rp="${v.replayability}">
      <td>${v.is_demo?db():""} ${v.id}</td>
      <td><span class="badge badge-${v.source_type==="sdk_snapshot"?"built":"ingested"}">${v.source_type.replace(/_/g," ")}</span></td>
      <td><span class="badge badge-${v.replayability}">${v.replayability.replace(/_/g," ")}</span></td>
      <td>${v.current_label_id?"✓":""} ${v.missing_prerequisites.includes("human_label")?"<span class='badge badge-planned'>needs label</span>":""}</td>
      <td>${v.agent_id||"—"}</td>
      <td class="action-row">
        ${v.replayability==="requires_human_label"?`<button class="btn btn-sm btn-amber" onclick="addLabel('${v.id}')">Add Label</button>`:""}
        ${v.replayability==="replayable"||v.replayability==="partially_replayable"?`<button class="btn btn-sm" onclick="promoteVR('${v.id}')">Promote to Incident</button>`:""}
        ${v.replayability==="evidence_only"?`<button class="btn btn-sm btn-outline" disabled>LLM — evidence only</button>`:""}
        <button class="btn btn-sm btn-outline" onclick="vrDetail('${v.id}')">Detail</button>
      </td></tr>`).join("")}</tbody></table>`;
}

function fVR(s,b){qa(".filter-pill").forEach(p=>p.classList.remove("active"));b.classList.add("active");qa(".vr-row").forEach(r=>r.classList.toggle("hidden",s!=="all"&&r.dataset.rp!==s))}
async function addLabel(id){
  const o=prompt("Expected outcome (e.g. ESCALATE_TO_HUMAN):","ESCALATE_TO_HUMAN");
  if(!o)return;
  const rv=prompt("Reviewer:","Support QA Lead");if(!rv)return;
  const r=prompt("Reason:","Policy requires escalation after 2 human requests");
  try{await a(`/v1/verification-records/${id}/label?expected_outcome=${encodeURIComponent(o)}&reviewer=${encodeURIComponent(rv)}&role=QA&reason=${encodeURIComponent(r||"")}`);R()}catch(e){alert("Failed: "+e.message)}
}
async function promoteVR(id){try{const r=await ap(`/v1/verification-records/${id}/promote-to-incident`);alert("Promoted to: "+r.incident_id);nav("incidents")}catch(e){alert("Failed: "+e.message)}}
async function vrDetail(id){try{const v=await a(`/v1/verification-records/${id}`);const c=q("#content");c.innerHTML=`<button class="btn btn-sm btn-outline" style="margin-bottom:16px" onclick="nav('verification-records')">← Back</button><div class="section-title">${v.id}</div>
    <div class="kv"><span class="kv-label">Source</span><span class="kv-value">${v.source_type}</span></div>
    <div class="kv"><span class="kv-label">Replayability</span><span class="kv-value"><span class="badge badge-${v.replayability}">${v.replayability}</span></span></div>
    <div class="kv"><span class="kv-label">Reason</span><span class="kv-value">${v.replayability_reason||"—"}</span></div>
    <div class="kv"><span class="kv-label">Root Hash</span><span class="kv-value" style="font-family:monospace;font-size:11px">${(v.root_hash||"—").substring(0,30)}</span></div>
    <div class="section-title">Events (${v.events?.length||0})</div>
    ${(v.events||[]).map(e=>`<div class="kv"><span class="kv-label">${e.kind}</span><span class="kv-value" style="font-size:11px;font-family:monospace">${JSON.stringify(e.payload).substring(0,80)}</span></div>`).join("")}
  `}catch(e){c.innerHTML=er("Not found")}}

// ── INCIDENTS ──
function renderInc(c,ix){
  q("#view-title").textContent="Incidents";
  if(!ix.length){c.innerHTML=em("No Incidents","Promote a Verification Record to an Incident to investigate.","Go to Records","nav('verification-records')");return;}
  c.innerHTML=`<div class="filter-pills">${["all","ingested","replayed","mitigated","certified"].map(s=>`<button class="filter-pill${s==="all"?" active":""}" onclick="fI('${s}',this)">${s.replace(/^./,x=>x.toUpperCase())} (${s==="all"?ix.length:ix.filter(i=>i.status===s).length})</button>`).join("")}</div>
    <table><thead><tr><th>ID</th><th>Status</th><th>R</th><th>F</th><th>C</th><th>Actions</th></tr></thead>
    <tbody>${ix.map(i=>iRow(i)).join("")}</tbody></table>`;
}
function iRow(i){
  const hr=i.replay_result&&Object.keys(i.replay_result).length>0,hf=i.mutation_result&&Object.keys(i.mutation_result).length>0,hc=i.certificate&&Object.keys(i.certificate).length>0;
  return`<tr class="inc-row" data-status="${i.status}">
    <td>${db()} <span style="text-decoration:underline;cursor:pointer" onclick="openInv('${i.incident_id}')">${i.incident_id}</span></td>
    <td>${ba(i.status)}</td><td>${hr?"✓":"—"}</td><td>${hf?"✓":"—"}</td><td>${hc?"✓":"—"}</td>
    <td class="action-row">
      ${!hr?`<button class="btn btn-sm" onclick="act('${i.incident_id}','replay')">Replay</button>`:""}
      ${hr&&!hf?`<button class="btn btn-sm btn-amber" onclick="act('${i.incident_id}','verify')">Verify Fix</button>`:""}
      ${hf&&!hc?`<button class="btn btn-sm btn-green" onclick="act('${i.incident_id}','certify')">Issue Proof</button>`:""}
      <button class="btn btn-sm btn-outline" onclick="openInv('${i.incident_id}')">Investigate</button>
    </td></tr>`;
}
function fI(s,b){qa(".filter-pill").forEach(p=>p.classList.remove("active"));b.classList.add("active");qa(".inc-row").forEach(r=>r.classList.toggle("hidden",s!=="all"&&r.dataset.status!==s))}
async function act(id,action){
  try{if(action==="replay")await ap("/v1/incidents/"+id+"/replay");else if(action==="verify")await ap("/v1/incidents/"+id+"/mutation-tests",{"fix_config":{"threshold":620},"expected_correct_behavior":"APPROVE"});else if(action==="certify")await ap("/v1/incidents/"+id+"/certificates");R()}catch(e){alert("Failed: "+e.message)}
}

// ── INVESTIGATION ──
async function openInv(id){
  S.view="investigation";q("#view-title").textContent="Incident: "+id;
  const c=q("#content");c.innerHTML=sk(200);
  try{const i=await a("/v1/incidents/"+id);const cr=i.certificate&&Object.keys(i.certificate).length>0?i.certificate:null;
    let cv=null;if(cr){try{cv=(await a("/v1/incidents/"+id+"/certificates/pom-cert-v1/verify")).signature_valid}catch(e){}}
    c.innerHTML=`
      <button class="btn btn-sm btn-outline" style="margin-bottom:16px" onclick="nav('incidents')">← Back</button>${db()}
      <div style="display:flex;gap:12px;align-items:center;margin:8px 0 16px">${ba(i.status)}<span style="font-size:13px;color:var(--muted)">ID: ${i.incident_id}</span></div>
      <section><div class="section-title">Business Flow</div>
        <div class="flow-row"><span class="flow-step">Customer system</span><span class="flow-arrow">→</span><span class="flow-step">Agent runtime</span><span class="flow-arrow">→</span><span class="flow-step">AI decision</span><span class="flow-arrow">→</span><span class="flow-step">${i.status==="certified"?"✓ Fixed + Certified":"⚠ Needs review"}</span></div>
      </section>
      <section><div class="section-title">Notary Evidence Flow</div>
        <div class="flow-row"><span class="flow-step">SDK captured</span><span class="flow-arrow">→</span><span class="flow-step">sealed evidence</span><span class="flow-arrow">→</span><span class="flow-step">ingested</span><span class="flow-arrow">→</span><span class="flow-step" style="color:${i.replay_result?'var(--green)':'var(--dim)'}">${i.replay_result?'replay-ready':'needs replay'}</span></div>
      </section>
      <section><div class="section-title">Evidence</div><div class="kv"><span class="kv-label">Root Hash</span><span class="kv-value" style="font-family:monospace;font-size:11px">${(i.snapshot_summary?.root_hash||"—").substring(0,20)}...</span></div><div class="kv"><span class="kv-label">Elements</span><span class="kv-value">${i.snapshot_summary?.element_count||"—"}</span></div></section>
      ${i.replay_result?`<section><div class="section-title">Replay</div><div class="kv"><span class="kv-label">Decision</span><span class="kv-value" style="font-weight:800">${i.replay_result.decision||"—"}</span></div></section>`:""}
      ${i.mutation_result?`<section><div class="section-title">Fix Verification</div><div class="kv"><span class="kv-label">Original</span><span class="kv-value">${i.mutation_result.original_decision}</span></div><div class="kv"><span class="kv-label">Mutated</span><span class="kv-value" style="color:${i.mutation_result.mitigated?'var(--green)':'var(--red)'}">${i.mutation_result.mutated_decision}</span></div><div class="kv"><span class="kv-label">Mitigated</span><span class="kv-value">${i.mutation_result.mitigated?'✓ Yes':'✗ No'}</span></div></section>`:""}
      ${cr?`<section><div class="section-title">Proof</div><div class="proof-bundle"><h3>${cr.certificate_id}</h3><div class="kv"><span class="kv-label">Algorithm</span><span class="kv-value" style="font-family:monospace;font-size:11px">${cr.signing_algorithm}</span></div><div class="kv"><span class="kv-label">Signature Valid</span><span class="kv-value" style="color:${cv===true?'var(--green)':'var(--red)'}">${cv===true?'✓ Yes':cv===false?'✗ No':'Unknown'}</span></div><div class="kv"><span class="kv-label">Claim Scope</span><span class="kv-value" style="font-size:11px">Verified fix for this tested scenario under recorded conditions. Does not certify general AI safety.</span></div><div class="kv"><span class="kv-label">Limitations</span><span class="kv-value" style="font-size:11px">${cr.known_limitations||"—"}</span></div><div style="margin-top:12px" class="action-row"><a href="/v1/incidents/${id}/certificates/pom-cert-v1/download" class="btn btn-sm btn-outline" style="text-decoration:none">Download JSON</a><button class="btn btn-sm btn-outline" onclick="verifyCert('${id}')">Verify Signature</button></div></div></section>`:""}
      <div class="action-row" style="margin-top:16px">
        ${!i.replay_result?`<button class="btn" onclick="act('${id}','replay');openInv('${id}')">Run Replay</button>`:""}
        ${i.replay_result&&!i.mutation_result?`<button class="btn btn-amber" onclick="act('${id}','verify');openInv('${id}')">Verify Fix</button>`:""}
        ${i.mutation_result&&!cr?`<button class="btn btn-green" onclick="act('${id}','certify');openInv('${id}')">Issue Proof</button>`:""}
      </div>`;
  }catch(e){c.innerHTML=er("Not found: "+e.message)}
}
async function verifyCert(id){try{const v=await a("/v1/incidents/"+id+"/certificates/pom-cert-v1/verify");alert(v.signature_valid?"Signature valid ✓":"Signature invalid ✗");}catch(e){alert("Verification failed")}}

// ── PROOFS ──
async function renderProofs(c,ix){
  q("#view-title").textContent="Proofs";
  const ct=ix.filter(i=>i.certificate&&Object.keys(i.certificate).length>0);
  if(!ct.length){c.innerHTML=em("No Proofs","Issue a proof from an incident.","Go to Incidents","nav('incidents')");return;}
  c.innerHTML=`<table><thead><tr><th>Certificate</th><th>Incident</th><th>Algorithm</th><th>Claim Scope</th><th>Actions</th></tr></thead><tbody>${ct.map(i=>`<tr><td>${db()} ${i.certificate.certificate_id}</td><td><span style="text-decoration:underline;cursor:pointer" onclick="openInv('${i.incident_id}')">${i.incident_id}</span></td><td style="font-family:monospace;font-size:10px">${i.certificate.signing_algorithm}</td><td style="font-size:11px">Bounded to tested scenario</td><td class="action-row"><button class="btn btn-sm btn-outline" onclick="verifyCert('${i.incident_id}')">Verify</button><a href="/v1/incidents/${i.incident_id}/certificates/pom-cert-v1/download" class="btn btn-sm btn-outline" style="text-decoration:none">Download</a></td></tr>`).join("")}</tbody></table>`;
}

// ── SCAFFOLDS ──
function renderScenarios(c){q("#view-title").textContent="Scenarios";c.innerHTML=`<div class="section-sub">Prevent recurrence by promoting verified incidents to regression tests.</div><div class="stat" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">Scenario Library</span>${pb()}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Promote verified incidents to reusable scenarios. Planned for design partner release.</div></div><div class="stat" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">Release Gates</span>${pb()}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Gate agent releases on scenario pass/fail results. Planned.</div></div>`;}
function renderGov(c){q("#view-title").textContent="Governance";c.innerHTML=`<div class="section-sub">Labels, claim scope, regulatory mappings, and audit — planned for compliance workflows.</div>${["Human Labels","Claim Scope","Regulatory Mappings","Retention","Audit Log"].map(s=>`<div class="stat" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">${s}</span>${pb()}</div></div>`).join("")}`;}
function renderSet(c){q("#view-title").textContent="Settings";c.innerHTML=`<div class="stat" style="margin-bottom:12px"><div style="font-size:14px;font-weight:700">Organization</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Acme Assurance Demo</div><div style="font-size:11px;color:var(--dim)">ID: org:acme-demo</div></div>${["Users & Roles","API Keys","Integrations","Entitlements"].map(s=>`<div class="stat" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">${s}</span>${pb()}</div></div>`).join("")}`;}

R();
</script></body></html>
